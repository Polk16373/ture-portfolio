<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental Blue & Dark Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a2f4a 50%, #0a0f1e 100%);
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 50px 30px;
            border: 3px solid #0099ff;
            border-radius: 15px;
            background: rgba(10, 20, 50, 0.9);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
        }

        h1 {
            font-size: 3em;
            color: #00d4ff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.4);
        }

        .subtitle {
            font-size: 1.2em;
            color: #00ffff;
            font-style: italic;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .card {
            background: rgba(20, 40, 80, 0.85);
            border: 2px solid #0099ff;
            border-radius: 15px;
            padding: 35px;
            transition: all 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 100, 180, 0.15);
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: #00d4ff;
            box-shadow: 0 10px 50px rgba(0, 150, 255, 0.3);
        }

        .card h2 {
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 1.6em;
        }

        .card p {
            color: #ffffff;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .btn {
            background: linear-gradient(135deg, #0099ff, #0055aa);
            color: #ffffff;
            border: 1px solid #0099ff;
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
        }

        .btn:hover {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.4);
            transform: translateY(-3px);
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px;
            border-top: 2px solid #0099ff;
            color: #00ffff;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Oriental Blue</h1>
            <p class="subtitle">สีฟ้านำสีดำแบบหรูหรา</p>
        </header>

        <div class="card-grid">
            <div class="card">
                <h2>🎨 Elegant</h2>
                <p>ออกแบบอย่างละเอียด สวยงามอย่างหรูหรา พร้อมสีน้ำเงินที่ลึกลับ</p>
                <button class="btn">ดูเพิ่มเติม</button>
            </div>

            <div class="card">
                <h2>🌙 Tranquil</h2>
                <p>บรรยากาศสงบนิ่ม ด้วยโทนสีดำที่ผสมน้ำเงินอ่อนๆ ให้ความสบายตา</p>
                <button class="btn">ดูเพิ่มเติม</button>
            </div>

            <div class="card">
                <h2>💎 Premium</h2>
                <p>มีลายระบายผู่กันโปร่งแสง สร้างความพิเศษและมีมิติ</p>
                <button class="btn">ดูเพิ่มเติม</button>
            </div>
        </div>

        <footer>
            <p>🌸 Oriental Design with Modern Touch 🌸</p>
        </footer>
    </div>
</body>
</html>
