<html lang="th">
<head>

    <title>Elsodus Blue Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://images-ext-1.discordapp.net/external/dSLKxnXHp5-1VpCLnrCMlFh8A_w1UpH3gPBVXrL_oI0/https/i.pinimg.com/564x/6e/36/a9/6e36a9ec03b3d79f15a37ab88f64a7f8.jpg');

            background-attachment: fixed;
            background-position: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 8, 32, 0.5);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 50px 30px;
            border: 3px solid #3a6fff;
            border-radius: 15px;
            background: rgba(13, 8, 32, 0.75);
            box-shadow: 0 0 50px rgba(58, 111, 255, 0.4);
        }

        h1 {
            font-size: 3em;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(58, 111, 255, 0.8), 0 0 60px rgba(100, 150, 255, 0.5);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #ffffff;
            font-style: italic;
            text-shadow: 0 0 20px rgba(58, 111, 255, 0.6);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
