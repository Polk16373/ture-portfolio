<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elsodus Blue Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 25%, #0d1929 50%, #1a2555 75%, #0a0e27 100%);
            background-attachment: fixed;
            color: #e0e6ff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 50px 30px;
            border: 3px solid #1e90ff;
            border-radius: 15px;
            background: rgba(10, 20, 60, 0.9);
            box-shadow: 0 0 40px rgba(30, 144, 255, 0.25);
        }

        h1 {
            font-size: 3em;
            color: #1e90ff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(30, 144, 255, 0.5);
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2em;
            color: #6495ed;
            font-style: italic;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .card {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.15), rgba(65, 105, 225, 0.1));
            border: 2px solid #1e90ff;
            border-radius: 15px;
            padding: 35px;
            transition: all 0.5s ease;
            box-shadow: 0 0 30px rgba(30, 144, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: #4169e1;
            box-shadow: 0 10px 50px rgba(30, 144, 255, 0.4);
        }

        .card h2 {
            color: #1e90ff;
            margin-bottom: 20px;
            font-size: 1.6em;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: #d0d8ff;
            line-height: 1.8;
            font-size: 1.05em;
            position: relative;
            z-index: 1;
        }

        .btn {
            background: linear-gradient(135deg, #1e90ff, #4169e1);
            color: #ffffff;
            border: 1px solid #1e90ff;
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            background: linear-gradient(135deg, #4169e1, #6495ed);
            box-shadow: 0 0 30px rgba(30, 144, 255, 0.5);
            transform: translateY(-3px);
        }
