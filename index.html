<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental Blue & Dark Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f35 25%, #0d1929 50%, #1a254a 75%, #0a0f1e 100%);
            background-attachment: fixed;
            color: #d0d8e8;
            font-family: 'Segoe UI', 'Microsoft YaHei', serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* ลายผู่กันแบบจีนๆ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 100, 200, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 120, 220, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 50px 30px;
            border: 3px solid;
            border-image: linear-gradient(135deg, #0099ff, #0055aa, #003366) 1;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(10, 30, 60, 0.4), rgba(20, 50, 100, 0.3));
            backdrop-filter: blur(10px);
            box-shadow: 
                inset 0 0 30px rgba(0, 150, 255, 0.1),
                0 0 40px rgba(0, 100, 180, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* ลายผู่สีฟ้า */
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 100, 200, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        h1 {
            font-size: 3em;
            color: #0099ff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
            position: relative;
            z-index: 1;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #6699cc;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .card {
            background: linear-gradient(135deg, rgba(20, 50, 100, 0.4), rgba(10, 30, 60, 0.3));
            border: 2px solid;
            border-image: linear-gradient(135deg, #0099ff, #0055aa) 1;
            border-radius: 15px;
            padding: 35px;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
            box-shadow: 
                inset 0 0 20px rgba(0, 150, 255, 0.08),
                0 0 30px rgba(0, 100, 180, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* ลายผู่ในการ์ด */
        .card::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-image: linear-gradient(135deg, #00d4ff, #0099ff) 1;
            box-shadow:

                0 10px 50px rgba(0, 120, 200, 0.25);
        }
